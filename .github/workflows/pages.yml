name: Deploy to GitHub Pages
on:
  push:
    branches: [main]
    paths:
      - 'public/**'
      - '.github/workflows/pages.yml'
  # Bot-Commits vom Scraper triggern `push` nicht (GITHUB_TOKEN-Limitation).
  # Deshalb zusätzlich auf erfolgreiche Scrape-Workflow-Läufe horchen.
  workflow_run:
    workflows: ["Daily Event Scrape", "Daily Social Event Scrape"]
    types: [completed]
    branches: [main]
  workflow_dispatch: {}

permissions:
  contents: read
  pages: write
  id-token: write

# Verhindert parallele Deploys; ein laufender Deploy darf fertig werden.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    # Skip Pages-Deploy, wenn upstream workflow_run fehlgeschlagen ist —
    # sonst deployt Pages auch bei Scrape-Fehlern (überflüssig + verwirrend).
    if: ${{ github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success' }}
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: public
      - id: deployment
        uses: actions/deploy-pages@v4
